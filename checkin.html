<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check-In — GymFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<div class="main-content">
  <header class="topbar">
    <span class="topbar-title">Check-In</span>
    <div class="topbar-actions">
      <span style="font-size:0.8rem; color:var(--text-muted);" id="liveClock"></span>
    </div>
  </header>

  <main class="page-content">

    <div style="display:grid; grid-template-columns:400px 1fr; gap:24px; align-items:start;">

      <!-- Check-In Panel -->
      <div>
        <div class="card" style="margin-bottom:16px;">
          <div class="card-header"><span class="card-title">Regjistro Hyrjen</span></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Kërko Anëtarin</label>
              <input class="form-control" id="checkinSearch" type="text" placeholder="Emri ose ID e anëtarit..."
                oninput="searchMember(this.value)" autocomplete="off" />
            </div>
            <div id="suggestions" style="display:none; background:var(--dark3); border:1px solid var(--border); border-radius:8px; margin-top:-8px; margin-bottom:14px; overflow:hidden;"></div>
            <div id="selectedMember" style="display:none; background:var(--dark3); border-radius:10px; padding:14px; margin-bottom:16px;">
              <div style="display:flex; align-items:center; gap:12px;">
                <div id="selAvatar" style="width:44px;height:44px;border-radius:50%;background:var(--primary);color:var(--dark);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:1rem;flex-shrink:0;"></div>
                <div>
                  <div id="selName" style="font-weight:600;"></div>
                  <div id="selStatus" style="font-size:0.78rem; margin-top:2px;"></div>
                </div>
              </div>
            </div>
            <button class="btn-primary-custom" style="width:100%; justify-content:center; padding:12px;" onclick="doCheckin()">
              ✅ Regjistro Check-In
            </button>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title">Statistikat Sot</span></div>
          <div class="card-body">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <div style="background:var(--dark3); border-radius:10px; padding:14px; text-align:center;">
                <div style="font-family:'Bebas Neue',cursive; font-size:2rem; color:var(--primary);" id="totalCheckins">37</div>
                <div style="font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Check-In Sot</div>
              </div>
              <div style="background:var(--dark3); border-radius:10px; padding:14px; text-align:center;">
                <div style="font-family:'Bebas Neue',cursive; font-size:2rem; color:var(--danger);">2</div>
                <div style="font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Anëtarësi Skaduar</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Log -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Historiku Sot</span>
          <span style="font-size:0.78rem; color:var(--text-muted);" id="logCount">37 hyrje</span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Ora</th>
                <th>Anëtari</th>
                <th>Statusi</th>
              </tr>
            </thead>
            <tbody id="checkinLog">
              <tr>
                <td style="color:var(--text-muted); font-size:0.82rem;">10:20</td>
                <td><strong>Fisnik Gashi</strong></td>
                <td><span class="badge-status status-active">Hyrje OK</span></td>
              </tr>
              <tr>
                <td style="color:var(--text-muted); font-size:0.82rem;">09:45</td>
                <td><strong>Valbona Hyseni</strong></td>
                <td><span class="badge-status status-active">Hyrje OK</span></td>
              </tr>
              <tr>
                <td style="color:var(--text-muted); font-size:0.82rem;">09:02</td>
                <td><strong>Blerim Hoxha</strong></td>
                <td><span class="badge-status status-expired">Skaduar</span></td>
              </tr>
              <tr>
                <td style="color:var(--text-muted); font-size:0.82rem;">08:31</td>
                <td><strong>Drita Morina</strong></td>
                <td><span class="badge-status status-active">Hyrje OK</span></td>
              </tr>
              <tr>
                <td style="color:var(--text-muted); font-size:0.82rem;">08:14</td>
                <td><strong>Arben Krasniqi</strong></td>
                <td><span class="badge-status status-active">Hyrje OK</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="main.js"></script>
<script>
  initSidebar('checkin');

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('liveClock').textContent =
      now.toLocaleTimeString('sq-AL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Members data
  const members = [
    { name: 'Arben Krasniqi',  status: 'active'  },
    { name: 'Drita Morina',    status: 'active'  },
    { name: 'Blerim Hoxha',    status: 'expired' },
    { name: 'Valbona Hyseni',  status: 'active'  },
    { name: 'Mimoza Bajra',    status: 'pending' },
    { name: 'Fisnik Gashi',    status: 'active'  },
    { name: 'Kujtim Osmani',   status: 'active'  },
    { name: 'Lirije Berisha',  status: 'active'  },
  ];

  let selectedMember = null;

  function searchMember(q) {
    const box = document.getElementById('suggestions');
    if (!q.trim()) { box.style.display = 'none'; return; }
    const matches = members.filter(m => m.name.toLowerCase().includes(q.toLowerCase()));
    if (!matches.length) { box.style.display = 'none'; return; }
    box.innerHTML = matches.map(m => `
      <div onclick="selectMember('${m.name}', '${m.status}')"
        style="padding:10px 14px; cursor:pointer; font-size:0.85rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;"
        onmouseover="this.style.background='var(--dark4)'" onmouseout="this.style.background=''">
        <span>${m.name}</span>
        <span class="badge-status ${m.status === 'active' ? 'status-active' : 'status-expired'}" style="font-size:0.68rem;">
          ${m.status === 'active' ? 'Aktiv' : 'Skaduar'}
        </span>
      </div>`).join('');
    box.style.display = 'block';
  }

  function selectMember(name, status) {
    selectedMember = { name, status };
    document.getElementById('checkinSearch').value = name;
    document.getElementById('suggestions').style.display = 'none';
    const initials = name.split(' ').map(p => p[0]).join('').toUpperCase();
    document.getElementById('selAvatar').textContent = initials;
    document.getElementById('selName').textContent   = name;
    document.getElementById('selStatus').innerHTML   =
      status === 'active'
        ? '<span class="badge-status status-active">Anëtarësi Aktive</span>'
        : '<span class="badge-status status-expired">Anëtarësia ka Skaduar</span>';
    document.getElementById('selectedMember').style.display = 'block';
  }

  function doCheckin() {
    if (!selectedMember) { showToast('Zgjidh një anëtar fillimisht!', 'warning'); return; }
    const now = new Date();
    const time = now.toLocaleTimeString('sq-AL', { hour: '2-digit', minute: '2-digit' });
    const isActive = selectedMember.status === 'active';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--text-muted); font-size:0.82rem;">${time}</td>
      <td><strong>${selectedMember.name}</strong></td>
      <td><span class="badge-status ${isActive ? 'status-active' : 'status-expired'}">${isActive ? 'Hyrje OK' : 'Skaduar'}</span></td>`;
    tr.style.animation = 'fadeUp 0.3s ease';
    document.getElementById('checkinLog').prepend(tr);
    const cnt = parseInt(document.getElementById('totalCheckins').textContent) + 1;
    document.getElementById('totalCheckins').textContent = cnt;
    document.getElementById('logCount').textContent = cnt + ' hyrje';

    showToast(
      isActive ? `${selectedMember.name} — Hyrja u regjistrua!` : `${selectedMember.name} — Anëtarësia ka skaduar!`,
      isActive ? 'success' : 'danger'
    );
    document.getElementById('checkinSearch').value = '';
    document.getElementById('selectedMember').style.display = 'none';
    selectedMember = null;
  }
</script>
</body>
</html>
